name: 'icd203-lint'
description: 'Lint analytic writing for ICD-203 violations: confidence, sourcing, attribution, hedging.'
author: 'Paul Goodwin'
branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  paths:
    description: 'Files or directories to lint. Space-separated. Defaults to the repository root.'
    required: false
    default: '.'
  severity:
    description: 'Severity floor (info, warn, error). Findings below this are not reported.'
    required: false
    default: 'warn'
  format:
    description: 'Output format. Use "github" for inline annotations, "sarif" for code scanning, "text" for logs.'
    required: false
    default: 'github'
  fail-on-findings:
    description: 'If true, the action fails when any finding is at or above the severity floor.'
    required: false
    default: 'true'
  select:
    description: 'Comma-separated list of rule ids to run exclusively.'
    required: false
    default: ''
  ignore:
    description: 'Comma-separated list of rule ids to skip.'
    required: false
    default: ''
  version:
    description: 'icd203-lint version to install (PyPI). Defaults to the latest.'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install icd203-lint
      shell: bash
      run: |
        if [ -n "${{ inputs.version }}" ]; then
          pip install "icd203-lint==${{ inputs.version }}"
        else
          pip install icd203-lint
        fi

    - name: Run icd203-lint
      shell: bash
      run: |
        ARGS=""
        if [ -n "${{ inputs.select }}" ]; then
          for r in $(echo "${{ inputs.select }}" | tr ',' ' '); do
            ARGS="$ARGS --select $r"
          done
        fi
        if [ -n "${{ inputs.ignore }}" ]; then
          for r in $(echo "${{ inputs.ignore }}" | tr ',' ' '); do
            ARGS="$ARGS --ignore $r"
          done
        fi
        set +e
        icd203-lint ${{ inputs.paths }} \
          --severity ${{ inputs.severity }} \
          --format ${{ inputs.format }} \
          $ARGS
        rc=$?
        set -e
        if [ "${{ inputs.fail-on-findings }}" = "true" ] && [ "$rc" -ne 0 ]; then
          exit $rc
        fi
        exit 0
